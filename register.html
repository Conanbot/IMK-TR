<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page-bg">
    <div class="auth-card" style="width: 580px; max-width: 100%;">
        <h2 class="auth-title text-white">Create Account</h2>
        <p class="auth-subtitle">Join the GameHub community</p>

        <form action="index.html" onsubmit="handleSignUp(event)">
            <!-- Email and Confirm Email -->
            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Email Address</label>
                    <input type="email" class="form-control form-control-custom w-100" placeholder="your@email.com" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Confirm Email</label>
                    <input type="email" class="form-control form-control-custom w-100" placeholder="your@email.com" required>
                </div>
            </div>

            <!-- Password and Confirm Password -->
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Password</label>
                    <input type="password" class="form-control form-control-custom w-100" placeholder="••••••••" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label form-label-custom">Confirm Password</label>
                    <input type="password" class="form-control form-control-custom w-100" placeholder="••••••••" required>
                </div>
            </div>

            <!-- reCAPTCHA and Country Dropdown -->
            <div class="row g-3 mb-4 align-items-center">
                <div class="col-md-6">
                    <div class="recaptcha-box-sim">
                        <div class="recaptcha-checkbox">
                            <input type="checkbox" id="recaptcha" required style="width: 22px; height: 22px; border-radius: 3px;">
                            <label for="recaptcha" style="user-select: none; font-size: 13px; color: var(--text-light); cursor: pointer;">I'm not a robot</label>
                        </div>
                        <div class="recaptcha-logo-wrapper">
                            <i class="fas fa-redo-alt" style="font-size: 12px; margin-bottom: 2px;"></i>
                            <span style="font-size: 8px;">reCAPTCHA</span>
                            <span style="font-size: 6px; color: #a19ea8;">Privacy - Terms</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <select class="form-select form-control-custom select-custom w-100" required>
                        <option value="ID" selected>Indonesia</option>
                        <option value="US">United States</option>
                        <option value="SG">Singapore</option>
                        <option value="MY">Malaysia</option>
                        <option value="JP">Japan</option>
                    </select>
                </div>
            </div>

            <!-- Terms & Agreement Checkbox -->
            <div class="d-flex gap-3 align-items-start mb-4">
                <input type="checkbox" id="agree-terms" checked required style="margin-top: 3px; min-width: 16px;">
                <label for="agree-terms" style="font-size: 12px; color: var(--text-muted); line-height: 1.5; cursor: pointer; user-select: none;">
                    I am 13 years of age or older and agree to the <span class="text-white text-decoration-underline">Game Hub Agreement</span> and <span class="text-white text-decoration-underline">Valve Privacy Policy</span>.
                </label>
            </div>

            <!-- Submit button -->
            <button type="submit" class="btn btn-solid-purple w-100 py-3 mb-3">Continue</button>

            <!-- Back to Login -->
            <div class="text-center mt-3">
                <span class="text-muted" style="font-size: 13px;">Already have a Game Hub account? </span>
                <a href="login.html" class="text-purple text-decoration-none fw-semibold" style="font-size: 13px; color: #a855f7;">Sign in here</a>
            </div>
        </form>
    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999;"></div>

    <script>
        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background:#272435;color:white;padding:16px 24px;border-radius:12px;border-left:6px solid ${type === 'success' ? '#22c55e' : '#a855f7'};box-shadow:0 15px 30px rgba(0,0,0,0.5);margin-top:10px;font-size:14px;`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function handleSignUp(e) {
            e.preventDefault();
            showToast("Account created successfully! Redirecting...", "success");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);
        }
    </script>
</body>

</html>
