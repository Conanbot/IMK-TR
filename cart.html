<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GameHub</a>
        </div>
    </nav>

    <div class="container mt-5">
        <h2>Shopping Cart</h2>
        <div id="cart-items" class="list-group"></div>
        <div class="text-end mt-4">
            <h4>Total: <span id="total-price">IDR 0</span></h4>
            <button class="btn btn-purple btn-lg" onclick="checkout()">Proceed to Payment</button>
        </div>
    </div>

    <script>
        function checkout() {
            alert("Payment Successful! (Demo)");
            window.location = "index.html";
        }
    </script>
</body>

</html>
