<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-window">
        <!-- Header -->
        <header class="app-header">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search">
            </div>
            
            <div class="nav-pill-container">
                <a href="index.html" class="nav-pill-item">Store</a>
                <a href="library.html" class="nav-pill-item">Library</a>
                <a href="community.html" class="nav-pill-item">Community</a>
                <a href="friends.html" class="nav-pill-item">Friends</a>
                <a href="about.html" class="nav-pill-item">More</a>
            </div>
            
            <div class="header-actions">
                <a href="cart.html" class="action-btn-circle active">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="btn-badge" id="cart-count">0</span>
                </a>
                <a href="#" class="action-btn-circle">
                    <i class="fas fa-bell"></i>
                </a>
                <div class="dropdown">
                    <a href="#" class="user-profile-card" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="user-avatar">U</div>
                        <div class="user-info">
                            <span class="user-name">User</span>
                            <span class="user-tag">@username</span>
                        </div>
                        <i class="fas fa-chevron-down ms-1" style="font-size: 10px; color: var(--text-muted);"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end border-0 shadow-lg mt-2" style="background: #272435; border-radius: 12px; padding: 8px;" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="wishlist.html" style="font-size: 14px;"><i class="fas fa-heart me-2 text-danger"></i> Wishlist</a></li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="img/setting.html" style="font-size: 14px;"><i class="fas fa-cog me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider border-secondary opacity-25"></li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3 text-danger" href="login.html" style="font-size: 14px;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Body -->
        <div class="app-body">
            <!-- Sidebar (Simple links back) -->
            <aside class="sidebar-filter">
                <div class="filter-section">
                    <h5 class="sidebar-title">Checkout Steps</h5>
                    <div class="filter-item text-white fw-semibold">
                        <label><i class="fas fa-check-circle text-purple me-2"></i> 1. Review Cart</label>
                    </div>
                    <div class="filter-item text-muted">
                        <label><i class="far fa-circle me-2"></i> 2. Payment Method</label>
                    </div>
                    <div class="filter-item text-muted">
                        <label><i class="far fa-circle me-2"></i> 3. Receipt</label>
                    </div>
                </div>

                <div class="mt-auto">
                    <a href="index.html" class="btn btn-sidebar-apply text-center text-decoration-none d-block"><i class="fas fa-arrow-left me-2"></i> Back to Store</a>
                </div>
            </aside>

            <!-- Main Viewport -->
            <main class="main-viewport">
                <h3 class="section-title mb-4">Your Shopping Cart</h3>

                <div class="row g-4">
                    <!-- Cart Items List -->
                    <div class="col-lg-8">
                        <div class="about-content-panel p-0 overflow-hidden" id="cart-panel" style="border: none;">
                            <div class="list-group rounded-3 border-0 bg-transparent" id="cart-list">
                                <!-- Dynamic Render -->
                            </div>
                        </div>
                    </div>

                    <!-- Summary Panel -->
                    <div class="col-lg-4">
                        <div class="about-content-panel">
                            <h5 class="about-panel-title"><i class="fas fa-receipt text-muted"></i> Order Summary</h5>
                            
                            <div class="d-flex justify-content-between mb-3" style="font-size: 14px;">
                                <span class="text-muted">Subtotal</span>
                                <span id="summary-subtotal" class="text-white">IDR 0</span>
                            </div>
                            <div class="d-flex justify-content-between mb-3" style="font-size: 14px;">
                                <span class="text-muted">Tax (11%)</span>
                                <span id="summary-tax" class="text-white">IDR 0</span>
                            </div>
                            <hr class="border-secondary opacity-25">
                            <div class="d-flex justify-content-between mb-4">
                                <span class="fw-semibold text-white">Estimated Total</span>
                                <span id="summary-total" class="fw-bold text-white fs-5">IDR 0</span>
                            </div>

                            <button class="btn btn-solid-purple w-100 py-3 text-uppercase fw-bold" onclick="checkout()" id="btn-checkout">
                                Proceed to Checkout
                            </button>
                            <a href="gift-to-friend.html" class="btn btn-outline-light w-100 py-3 text-uppercase fw-bold mt-2" id="btn-gift" style="font-size: 13px;">
                                <i class="fas fa-gift me-2"></i> Gift to Friend
                            </a>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999;"></div>

    <!-- Bootstrap Modal for Checkout -->
    <div class="modal fade" id="paymentModal" tabindex="-1" aria-labelledby="paymentModalLabel" aria-hidden="true" style="backdrop-filter: blur(10px);">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content modal-content-glass">
                <div class="modal-header modal-header-glass border-0">
                    <h5 class="modal-title modal-title-custom text-white" id="paymentModalLabel">Checkout</h5>
                    <button type="button" class="modal-btn-close border-0" data-bs-dismiss="modal" aria-label="Close"><i class="fas fa-times"></i></button>
                </div>
                <div class="modal-body modal-body-glass" id="payment-modal-body">
                    <!-- Dynamic Steps: Step 1 (Method & Details) / Step 2 (Confirmation) -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Localized metadata for card images
        const gameImages = {
            "Subnautica 2": "https://images.unsplash.com/photo-1682687220063-4742bd7fd538?q=80&w=200",
            "PRAGMATA": "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=200",
            "GRAND THEFT AUTO VI": "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=200",
            "RESIDENT EVIL REQUIEM": "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=200",
            "FORZA HORIZON 6": "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=200"
        };

        function renderCartPage() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').textContent = cart.length;

            const cartList = document.getElementById('cart-list');
            const summarySubtotal = document.getElementById('summary-subtotal');
            const summaryTax = document.getElementById('summary-tax');
            const summaryTotal = document.getElementById('summary-total');
            const btnCheckout = document.getElementById('btn-checkout');

            if (cart.length === 0) {
                cartList.innerHTML = `
                    <div class="text-center py-5" style="background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid rgba(255,255,255,0.04);">
                        <i class="fas fa-shopping-basket mb-3 text-muted" style="font-size: 48px;"></i>
                        <h4 class="fs-6 text-white mb-2">Your cart is currently empty</h4>
                        <p class="text-muted mb-4" style="font-size: 13px;">Find something exciting in the store to get started.</p>
                        <a href="index.html" class="btn btn-solid-purple px-4 py-2" style="font-size: 13px;">Go to Store</a>
                    </div>
                `;
                summarySubtotal.textContent = "IDR 0";
                summaryTax.textContent = "IDR 0";
                summaryTotal.textContent = "IDR 0";
                btnCheckout.disabled = true;
                return;
            }

            btnCheckout.disabled = false;
            cartList.innerHTML = '';
            let subtotal = 0;

            cart.forEach((item, index) => {
                const priceVal = parseInt(item.price.replace(/[^\d]/g, '')) || 0;
                subtotal += priceVal;

                // get matching cover image
                const imgUrl = item.img || gameImages[item.title.toUpperCase()] || gameImages[item.title] || "https://picsum.photos/id/100/200/200";

                cartList.innerHTML += `
                    <div class="list-group-item bg-transparent text-white border-0 border-bottom border-secondary py-3 px-4 d-flex justify-content-between align-items-center" style="border-color: rgba(255,255,255,0.05) !important; background: rgba(255,255,255,0.01) !important; margin-bottom: 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04) !important;">
                        <div class="d-flex align-items-center gap-3">
                            <img src="${imgUrl}" alt="${item.title}" style="width: 70px; height: 90px; object-fit: cover; border-radius: 8px;">
                            <div>
                                <h6 class="mb-1 fw-bold fs-6">${item.title}</h6>
                                <span class="badge" style="background: rgba(255,255,255,0.08); font-size: 10px;">Base Game</span>
                            </div>
                        </div>
                        <div class="d-flex align-items-center gap-4">
                            <span class="fw-semibold text-white">${item.price}</span>
                            <button class="btn btn-outline-danger btn-sm border-0" onclick="removeFromCart(${index})" style="border-radius: 6px;"><i class="far fa-trash-alt"></i></button>
                        </div>
                    </div>
                `;
            });

            const tax = Math.round(subtotal * 0.11);
            const total = subtotal + tax;

            summarySubtotal.textContent = "IDR " + subtotal.toLocaleString('id-ID');
            summaryTax.textContent = "IDR " + tax.toLocaleString('id-ID');
            summaryTotal.textContent = "IDR " + total.toLocaleString('id-ID');
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const removed = cart[index];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            showToast(`🗑️ Removed ${removed.title} from cart!`);
            renderCartPage();
        }

        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background:#272435;color:white;padding:16px 24px;border-radius:12px;border-left:6px solid ${type === 'success' ? '#22c55e' : '#a855f7'};box-shadow:0 15px 30px rgba(0,0,0,0.5);margin-top:10px;font-size:14px;`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function checkout() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (cart.length === 0) return;

            const modalEl = document.getElementById('paymentModal');
            const paymentModal = new bootstrap.Modal(modalEl);
            paymentModal.show();
            
            renderModalPaymentMethod();
            
            // Re-render cart on modal hidden to clear items if paid
            modalEl.addEventListener('hidden.bs.modal', function () {
                renderCartPage();
            });
        }

        function renderModalPaymentMethod() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const modalBody = document.getElementById('payment-modal-body');
            
            let subtotal = 0;
            let itemsHtml = '';
            cart.forEach(it => {
                const priceVal = typeof it.price === 'number' ? it.price : parseInt(it.price.replace(/[^\d]/g, '')) || 0;
                subtotal += priceVal;
                itemsHtml += `
                    <div class="d-flex justify-content-between mb-2">
                        <div>${it.title}</div>
                        <div class="text-white">IDR ${priceVal.toLocaleString('id-ID')}</div>
                    </div>
                `;
            });
            const tax = Math.round(subtotal * 0.11);
            const total = subtotal + tax;

            modalBody.innerHTML = `
                <div class="payment-container p-0">
                    <div class="row">
                        <div class="col-lg-7">
                            <div class="about-content-panel mb-4">
                                <h5 class="about-panel-title"><i class="fas fa-credit-card text-muted"></i> Choose a payment method</h5>

                                <div class="form-check mt-3">
                                    <input class="form-check-input" type="radio" name="modalPaymentMethod" id="mpm-card" value="card" checked onchange="toggleModalBillingDetails(true)">
                                    <label class="form-check-label ms-2 text-white" for="mpm-card">Credit / Debit Card</label>
                                </div>

                                <div class="form-check mt-3">
                                    <input class="form-check-input" type="radio" name="modalPaymentMethod" id="mpm-gopay" value="gopay" onchange="toggleModalBillingDetails(false)">
                                    <label class="form-check-label ms-2 text-white" for="mpm-gopay">E-Wallet (GoPay / OVO)</label>
                                </div>

                                <div class="form-check mt-3">
                                    <input class="form-check-input" type="radio" name="modalPaymentMethod" id="mpm-bank" value="bank" onchange="toggleModalBillingDetails(false)">
                                    <label class="form-check-label ms-2 text-white" for="mpm-bank">Bank Transfer</label>
                                </div>
                            </div>

                            <div class="about-content-panel mb-4" id="modal-billing-details-panel">
                                <h5 class="about-panel-title"><i class="fas fa-file-invoice text-muted"></i> Billing details</h5>
                                <div class="row g-3">
                                    <div class="col-md-12">
                                        <input class="form-control bg-dark text-white border-0 py-2" id="modal-card-name" placeholder="Name on card">
                                    </div>
                                    <div class="col-md-12">
                                        <input class="form-control bg-dark text-white border-0 py-2" id="modal-card-number" placeholder="Card number">
                                    </div>
                                    <div class="col-md-4">
                                        <input class="form-control bg-dark text-white border-0 py-2" id="modal-card-exp" placeholder="MM/YY">
                                    </div>
                                    <div class="col-md-4">
                                        <input class="form-control bg-dark text-white border-0 py-2" id="modal-card-cvc" placeholder="CVC">
                                    </div>
                                    <div class="col-md-4">
                                        <input class="form-control bg-dark text-white border-0 py-2" id="modal-card-postal" placeholder="Postal code">
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex gap-3">
                                <button type="button" class="btn btn-outline-light px-4 py-2" data-bs-dismiss="modal">Cancel</button>
                                <button id="btn-modal-proceed-payment" class="btn btn-solid-purple px-4 py-2">Proceed to Payment</button>
                            </div>
                        </div>

                        <div class="col-lg-5">
                            <div class="about-content-panel h-100">
                                <h5 class="about-panel-title"><i class="fas fa-receipt text-muted"></i> Order Summary</h5>
                                <div class="mb-3" style="max-height: 180px; overflow-y: auto; font-size: 13px;">${itemsHtml}</div>
                                <div class="d-flex justify-content-between mb-2" style="font-size: 13px;"><span class="text-muted">Subtotal</span><span class="text-white">IDR ${subtotal.toLocaleString('id-ID')}</span></div>
                                <div class="d-flex justify-content-between mb-2" style="font-size: 13px;"><span class="text-muted">Tax (11%)</span><span class="text-white">IDR ${tax.toLocaleString('id-ID')}</span></div>
                                <hr class="border-secondary opacity-25">
                                <div class="d-flex justify-content-between"><strong class="text-white">Total</strong><strong class="text-white">IDR ${total.toLocaleString('id-ID')}</strong></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            setupModalPaymentHandlers();
        }

        function toggleModalBillingDetails(show) {
            const panel = document.getElementById('modal-billing-details-panel');
            if (panel) {
                panel.style.display = show ? 'block' : 'none';
            }
            const btn = document.getElementById('btn-modal-proceed-payment');
            if (btn) {
                if (show) {
                    btn.disabled = !validateModalPaymentForm();
                } else {
                    btn.disabled = false;
                }
            }
        }

        function setupModalPaymentHandlers() {
            const btn = document.getElementById('btn-modal-proceed-payment');
            const name = document.getElementById('modal-card-name');
            const number = document.getElementById('modal-card-number');
            const exp = document.getElementById('modal-card-exp');
            const cvc = document.getElementById('modal-card-cvc');

            if (number) {
                number.addEventListener('input', function () {
                    const raw = (number.value || '').replace(/[^0-9]/g, '').slice(0, 19);
                    const parts = raw.match(/.{1,4}/g) || [];
                    number.value = parts.join(' ');
                    updateProceedButtonState();
                });
            }

            if (exp) {
                exp.addEventListener('input', function () {
                    let v = (exp.value || '').replace(/[^0-9]/g, '').slice(0, 4);
                    if (v.length >= 3) {
                        exp.value = v.slice(0, 2) + '/' + v.slice(2);
                    } else {
                        exp.value = v;
                    }
                    updateProceedButtonState();
                });
            }

            if (cvc) cvc.addEventListener('input', updateProceedButtonState);
            if (name) name.addEventListener('input', updateProceedButtonState);

            function updateProceedButtonState() {
                const methodInput = document.querySelector('input[name="modalPaymentMethod"]:checked');
                const selectedMethod = methodInput ? methodInput.value : 'card';
                if (selectedMethod === 'card') {
                    btn.disabled = !validateModalPaymentForm();
                } else {
                    btn.disabled = false;
                }
            }

            if (btn) {
                btn.addEventListener('click', function () {
                    const methodInput = document.querySelector('input[name="modalPaymentMethod"]:checked');
                    const selectedMethod = methodInput ? methodInput.value : 'card';
                    if (selectedMethod === 'card' && !validateModalPaymentForm()) {
                        showToast('Please complete valid card details', 'info');
                        return;
                    }
                    finalizeModalPayment();
                });
            }

            updateProceedButtonState();
        }

        function validateModalPaymentForm() {
            const name = document.getElementById('modal-card-name');
            const number = document.getElementById('modal-card-number');
            const exp = document.getElementById('modal-card-exp');
            const cvc = document.getElementById('modal-card-cvc');

            const nm = name ? name.value.trim() : '';
            const numv = number ? (number.value || '').toString().replace(/[^0-9]/g, '') : '';
            const expv = exp ? exp.value.trim() : '';
            const cvcv = cvc ? cvc.value.trim() : '';

            if (!nm) return false;
            if (!/^[0-9]{12,19}$/.test(numv)) return false;

            let sum = 0;
            let shouldDouble = false;
            for (let i = numv.length - 1; i >= 0; i--) {
                let digit = parseInt(numv.charAt(i), 10);
                if (shouldDouble) {
                    digit *= 2;
                    if (digit > 9) digit -= 9;
                }
                sum += digit;
                shouldDouble = !shouldDouble;
            }
            if ((sum % 10) !== 0) return false;

            const m = expv.match(/^(0?[1-9]|1[0-2])[\/:\s]?(\d{2})$/);
            if (!m) return false;
            const month = parseInt(m[1], 10);
            let year = parseInt(m[2], 10) + 2000;
            const now = new Date();
            const expDate = new Date(year, month - 1, 1);
            expDate.setMonth(expDate.getMonth() + 1);
            if (expDate <= now) return false;

            if (!/^\d{3,4}$/.test(cvcv)) return false;

            return true;
        }

        function finalizeModalPayment() {
            showToast('Processing payment...', 'success');
            
            const methodInput = document.querySelector('input[name="modalPaymentMethod"]:checked');
            const selectedMethod = methodInput ? methodInput.value : 'card';
            const methodLabel = selectedMethod === 'gopay' ? 'GoPay / OVO' : selectedMethod === 'bank' ? 'Bank Transfer' : 'Credit / Debit Card';
            
            let paymentDetail = methodLabel;
            if (selectedMethod === 'card') {
                const numVal = document.getElementById('modal-card-number').value || '';
                const raw = numVal.replace(/[^0-9]/g, '');
                const last4 = raw.slice(-4);
                paymentDetail = last4 ? '•••• •••• •••• ' + last4 : methodLabel;
            }

            let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            let subtotal = 0;
            cartItems.forEach(it => {
                const priceVal = typeof it.price === 'number' ? it.price : parseInt(it.price.replace(/[^\d]/g, '')) || 0;
                subtotal += priceVal;
            });
            const tax = Math.round(subtotal * 0.11);
            const total = subtotal + tax;

            const order = {
                id: 'GH-' + Date.now(),
                date: new Date().toISOString(),
                items: cartItems,
                subtotal,
                tax,
                total,
                paymentMethod: methodLabel,
                paymentDetail
            };

            try {
                localStorage.setItem('lastOrder', JSON.stringify(order));
                const orders = JSON.parse(localStorage.getItem('orders') || '[]');
                orders.unshift(order);
                localStorage.setItem('orders', JSON.stringify(orders));
            } catch (e) {}

            localStorage.removeItem('cart');
            renderModalConfirmation(order);
        }

        function renderModalConfirmation(order) {
            const modalBody = document.getElementById('payment-modal-body');
            
            let itemsHtml = '';
            (order.items || []).forEach(it => {
                const imgUrl = gameImages[it.title.toUpperCase()] || gameImages[it.title] || "https://picsum.photos/id/100/200/200";
                const priceVal = typeof it.price === 'number' ? it.price : parseInt((it.price||'0').toString().replace(/[^\d]/g,'')) || 0;
                itemsHtml += `
                    <div class="game-item d-flex align-items-center mb-3">
                        <img src="${imgUrl}" alt="${it.title}" class="game-thumbnail" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 12px;">
                        <div class="game-info flex-grow-1">
                            <div class="game-title text-white fw-bold" style="font-size: 13px;">${it.title}</div>
                            <div class="game-price text-muted" style="font-size: 11px;">${it.genre || ''}</div>
                        </div>
                        <div class="item-value text-white fw-semibold" style="font-size: 13px;">IDR ${priceVal.toLocaleString('id-ID')}</div>
                    </div>
                `;
            });

            const date = new Date(order.date);

            modalBody.innerHTML = `
                <div class="payment-container p-0">
                    <div class="payment-header mb-4 text-center">
                        <div class="payment-status status-success" style="font-size: 50px; color: #22c55e;">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h4 class="text-white mt-2 mb-1">Payment Successful!</h4>
                        <p class="text-muted" style="font-size: 13px;">Your order has been confirmed and is being processed</p>
                    </div>

                    <div class="confirmation-number text-center py-2 mb-3" style="background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
                        <div class="conf-label" style="font-size: 11px; color: #858097; margin-bottom: 2px;">ORDER NUMBER</div>
                        <div class="conf-number" style="color: #22c55e; font-size: 16px; font-weight: 700; font-family: monospace;">${order.id}</div>
                    </div>

                    <div class="confirmation-card p-3 mb-3" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;">
                        <h6 class="text-white mb-2" style="font-size: 13px;">Payment Method</h6>
                        <div class="payment-method d-flex align-items-center p-2 mb-0" style="background: rgba(255, 255, 255, 0.03); border-radius: 8px;">
                            <div class="payment-method-icon me-3" style="font-size: 20px; color: #7c3aed;"><i class="fas fa-credit-card"></i></div>
                            <div class="payment-method-info flex-grow-1">
                                <div class="payment-method-name text-white fw-bold" style="font-size: 13px; line-height: 1.2;">${order.paymentMethod}</div>
                                <div class="payment-method-detail text-muted" style="font-size: 11px; line-height: 1.2;">${order.paymentDetail}</div>
                            </div>
                        </div>
                    </div>

                    <div class="confirmation-card p-3 mb-3" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;">
                        <h6 class="text-white mb-2" style="font-size: 13px;">Purchased Items</h6>
                        <div style="max-height: 140px; overflow-y: auto;">
                            ${itemsHtml}
                        </div>
                    </div>

                    <div class="total-section p-3 mb-3 text-center" style="background: rgba(124, 58, 237, 0.08); border: 1px solid rgba(124, 58, 237, 0.25); border-radius: 12px; margin: 15px 0;">
                        <div class="total-label" style="font-size: 11px; color: #858097; margin-bottom: 4px;">TOTAL AMOUNT PAID</div>
                        <div class="total-value" style="color: #22c55e; font-size: 24px; font-weight: 700;">IDR ${order.total.toLocaleString('id-ID')}</div>
                    </div>

                    <div class="confirmation-card p-3 mb-4" style="background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px;">
                        <div class="d-flex justify-content-between mb-2" style="font-size: 12px;"><span class="text-muted">Transaction Date</span><span class="text-white">${date.toLocaleDateString()}</span></div>
                        <div class="d-flex justify-content-between mb-2" style="font-size: 12px;"><span class="text-muted">Transaction Time</span><span class="text-white">${date.toLocaleTimeString()}</span></div>
                        <div class="d-flex justify-content-between" style="font-size: 12px;"><span class="text-muted">Email Receipt</span><span style="color: #7c3aed;">user@example.com</span></div>
                    </div>

                    <div class="d-flex gap-3">
                        <a href="order-history.html" class="btn btn-solid-purple flex-grow-1 py-3 text-uppercase fw-bold text-center text-decoration-none text-white" style="font-size: 13px;"><i class="fas fa-history me-2"></i> Order History</a>
                        <button type="button" class="btn btn-outline-light flex-grow-1 py-3 text-uppercase fw-bold" data-bs-dismiss="modal" style="font-size: 13px;"><i class="fas fa-shopping-bag me-2"></i> Continue Shopping</button>
                    </div>
                </div>
            `;
        }

        window.onload = function() {
            renderCartPage();
        }
    </script>
</body>

</html>
