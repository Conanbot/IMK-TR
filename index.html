<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub - Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-3" href="index.html"><i class="fas fa-gamepad"></i> GameHub</a>
            <div class="navbar-nav flex-row gap-4 mx-auto">
                <a href="index.html" class="nav-link active">Store</a>
                <a href="#" class="nav-link">Library</a>
                <a href="#" class="nav-link">Community</a>
                <a href="friends.html" class="nav-link">Friends</a>
            </div>
            <div class="d-flex align-items-center gap-3">
                <a href="cart.html" class="text-light position-relative">
                    <i class="fas fa-shopping-cart fa-2x"></i>
                </a>
                <a href="login.html" class="btn btn-outline-light">Login</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid pt-5 mt-5">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-3 border-end p-4">
                <h5>Genre</h5>
                <div class="mb-4">
                    <div class="form-check"><input type="checkbox" checked class="form-check-input"> Survival</div>
                    <div class="form-check"><input type="checkbox" class="form-check-input"> Action</div>
                    <div class="form-check"><input type="checkbox" class="form-check-input"> RPG</div>
                    <div class="form-check"><input type="checkbox" class="form-check-input"> Horror</div>
                </div>
                <h5>Price Range</h5>
                <input type="range" class="form-range">
            </div>

            <!-- Main Content -->
            <div class="col-lg-9 p-4">
                <div class="hero mb-5" style="background-image: url('https://picsum.photos/id/1015/1920/1080')">
                    <div class="position-absolute bottom-0 p-5">
                        <h1 class="display-3 fw-bold text-white">SUBNAUTICA 2</h1>
                        <a href="gamedetail.html?id=1" class="btn btn-purple btn-lg px-5">Buy Now</a>
                    </div>
                </div>

                <h4 class="mb-4">You might like</h4>
                <div class="row g-4" id="game-grid"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const games = [
            { id: 1, title: "Subnautica 2", price: "350.999" },
            { id: 2, title: "GTA VI", price: "1.130.500" },
            { id: 3, title: "Elden Ring", price: "239.990" },
            { id: 4, title: "Forza Horizon 6", price: "719.200" }
        ];

        const grid = document.getElementById('game-grid');
        games.forEach(game => {
            grid.innerHTML += `
                <div class="col-md-4 col-lg-3">
                    <div class="game-card card h-100" onclick="window.location='gamedetail.html?id=${game.id}'">
                        <img src="https://picsum.photos/id/1${game.id}0/300/380" class="card-img-top">
                        <div class="card-body">
                            <h6>${game.title}</h6>
                            <strong>IDR ${game.price}</strong>
                        </div>
                    </div>
                </div>
            `;
        });
    </script>
</body>

</html>
