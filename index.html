<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Anime.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top" id="main-navbar">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#" onclick="navigateTo('home')">
                <i class="fas fa-gamepad fa-2x text-purple me-2"></i>
                <span class="fw-bold fs-4">GameHub</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('store')">Store</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('library')">Library</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('community')">Community</a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('friends')">Friends</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="navigateTo('more')">More</a></li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <div class="search-bar">
                        <input type="text" class="form-control" placeholder="Search games..." id="global-search">
                    </div>

                    <button class="btn btn-link text-light position-relative" onclick="showCart()">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle"
                            id="cart-count">4</span>
                    </button>

                    <button class="btn btn-link text-light position-relative" onclick="toggleNotifications()">
                        <i class="fas fa-bell fa-lg"></i>
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">3</span>
                    </button>

                    <div class="dropdown">
                        <a class="d-flex align-items-center text-decoration-none text-light" href="#"
                            data-bs-toggle="dropdown">
                            <div
                                class="avatar-circle bg-primary text-white d-flex align-items-center justify-content-center me-2">
                                KW
                            </div>
                            <div>
                                <small class="d-block">Kirana Wren</small>
                                <small class="text-muted">@username</small>
                            </div>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="navigateTo('profile')">Profile</a></li>
                            <li><a class="dropdown-item" href="#" onclick="navigateTo('settings')">Settings</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="#">Sign Out</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container-fluid pt-5" style="margin-top: 70px;">
        <div class="row">
            <!-- SIDEBAR (dynamic) -->
            <div class="col-lg-2 border-end vh-100 overflow-auto" id="sidebar">
                <!-- JS will inject sidebar content -->
            </div>

            <!-- PAGE CONTENT -->
            <div class="col-lg-10" id="main-content">
                <!-- Home / Store Page by default -->
            </div>
        </div>
    </div>

    <!-- TOAST CONTAINER -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toast-container"></div>

    <!-- MODALS -->
    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-xl">
            <div class="modal-content bg-dark text-light">
                <div class="modal-header">
                    <h5 class="modal-title">Shopping Cart</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cart-items">
                    <!-- JS injected -->
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline-light" onclick="clearCart()">Clear Cart</button>
                    <button class="btn btn-purple" onclick="proceedToCheckout()">Proceed to Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
