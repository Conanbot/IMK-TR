<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Detail - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">GameHub</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-8">
                <img id="game-img" class="img-fluid rounded-4 mb-4"
                    style="width:100%; max-height:520px; object-fit:cover;">
                <h2 id="game-title"></h2>
                <p class="text-success fs-5" id="game-genre"></p>
            </div>
            <div class="col-lg-4">
                <div class="bg-dark p-4 rounded-4">
                    <h3 class="text-success" id="game-price"></h3>
                    <button class="btn btn-purple w-100 mt-3" onclick="addToCart()">Add to Cart</button>
                    <button class="btn btn-outline-light w-100 mt-2" onclick="addToWishlist()">Add to Wishlist</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(location.search);
        const id = parseInt(params.get('id')) || 1;
        const gameData = {
            1: { title: "Subnautica 2", price: "IDR 350.999", genre: "Survival", img: "https://picsum.photos/id/1015/800/450" },
            2: { title: "GTA VI", price: "IDR 1.130.500", genre: "Action", img: "https://picsum.photos/id/237/800/450" }
        };
        const g = gameData[id] || gameData[1];

        document.getElementById('game-title').textContent = g.title;
        document.getElementById('game-genre').textContent = g.genre;
        document.getElementById('game-price').textContent = g.price;
        document.getElementById('game-img').src = g.img;
    </script>
</body>

</html>
