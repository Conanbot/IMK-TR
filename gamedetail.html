<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Detail - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-window">
        <!-- Header -->
        <header class="app-header">
            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" placeholder="Search">
            </div>
            
            <div class="nav-pill-container">
                <a href="index.html" class="nav-pill-item">Store</a>
                <a href="about.html" class="nav-pill-item">Library</a>
                <a href="community.html" class="nav-pill-item">Community</a>
                <a href="friends.html" class="nav-pill-item">Friends</a>
                <a href="about.html" class="nav-pill-item">More</a>
            </div>
            
            <div class="header-actions">
                <a href="cart.html" class="action-btn-circle">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="btn-badge" id="cart-count">0</span>
                </a>
                <a href="#" class="action-btn-circle">
                    <i class="fas fa-bell"></i>
                </a>
                <div class="dropdown">
                    <a href="#" class="user-profile-card" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        <div class="user-avatar">U</div>
                        <div class="user-info">
                            <span class="user-name">User</span>
                            <span class="user-tag">@username</span>
                        </div>
                        <i class="fas fa-chevron-down ms-1" style="font-size: 10px; color: var(--text-muted);"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end border-0 shadow-lg mt-2" style="background: #272435; border-radius: 12px; padding: 8px;" aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="wishlist.html" style="font-size: 14px;"><i class="fas fa-heart me-2 text-danger"></i> Wishlist</a></li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="about.html" style="font-size: 14px;"><i class="fas fa-cog me-2"></i> Settings</a></li>
                        <li><hr class="dropdown-divider border-secondary opacity-25"></li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3 text-danger" href="login.html" style="font-size: 14px;"><i class="fas fa-sign-out-alt me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Body -->
        <div class="app-body">
            <!-- Sidebar Navigation -->
            <aside class="sidebar-filter">
                <div class="filter-section">
                    <h5 class="sidebar-title">Game Info</h5>
                    <div class="filter-item text-white">
                        <label><i class="fas fa-info-circle me-2"></i> Overview</label>
                    </div>
                    <div class="filter-item text-muted">
                        <label><i class="far fa-image me-2"></i> Media Gallery</label>
                    </div>
                    <div class="filter-item text-muted">
                        <label><i class="fas fa-list me-2"></i> Requirements</label>
                    </div>
                </div>

                <div class="mt-auto">
                    <a href="index.html" class="btn btn-sidebar-apply text-center text-decoration-none d-block"><i class="fas fa-arrow-left me-2"></i> Back to Store</a>
                </div>
            </aside>

            <!-- Main Viewport -->
            <main class="main-viewport">
                <div class="row g-4">
                    <!-- Left Game Column -->
                    <div class="col-lg-8">
                        <img id="game-img" class="img-fluid w-100 rounded-4 border border-secondary mb-4 shadow" style="max-height: 440px; object-fit: cover;" alt="Game Banner">
                        
                        <h2 id="game-title" class="fw-bold text-white fs-3 mb-2"></h2>
                        <div class="d-flex gap-3 align-items-center mb-4">
                            <span class="badge" id="game-genre" style="background: rgba(124, 58, 237, 0.15); color: #a855f7; font-size: 12px;"></span>
                            <span class="text-success" style="font-size: 13px;"><i class="fas fa-thumbs-up me-1"></i> Very Positive (94%)</span>
                        </div>
                        
                        <div class="about-content-panel mb-4">
                            <h5 class="about-panel-title text-white mb-3">About the Game</h5>
                            <p id="game-desc" class="text-muted" style="line-height: 1.7; font-size: 14.5px;"></p>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <div class="about-content-panel">
                                    <div class="text-muted mb-1" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">Developer</div>
                                    <div class="text-white fw-semibold" id="game-dev" style="font-size: 14px;"></div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="about-content-panel">
                                    <div class="text-muted mb-1" style="font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;">Release Date</div>
                                    <div class="text-white fw-semibold" id="game-release" style="font-size: 14px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Right Purchase Column -->
                    <div class="col-lg-4">
                        <div class="about-content-panel sticky-top" style="top: 20px;">
                            <span class="sidebar-title" style="font-size: 10px;">Buy Offer</span>
                            <h3 class="text-white fw-bold my-3 fs-3" id="game-price"></h3>
                            
                            <div class="d-grid gap-2 mt-4">
                                <button class="btn btn-solid-purple py-3 text-uppercase fw-bold" onclick="addGameToCart()">
                                    Add to Cart
                                </button>
                                <button class="btn btn-wishlist py-3" onclick="addGameToWishlist()">
                                    <i class="far fa-heart me-2"></i> Add to Wishlist
                                </button>
                            </div>

                            <hr class="border-secondary opacity-25 my-4">

                            <div>
                                <span class="sidebar-title" style="font-size: 9px; display: block; margin-bottom: 12px;">Platforms Supported</span>
                                <div class="d-flex gap-3 text-muted" style="font-size: 18px;" id="game-platforms">
                                    <!-- Dynamic Platform Icons -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Database
        const gameDb = {
            1: {
                title: "Subnautica 2",
                price: "IDR 350,999",
                genre: "Survival",
                desc: "Immerse yourself in a new adventure with Subnautica 2, an open-water survival game from the creators of Subnautica. Play alone or with friends, exploring alluring biomes & discovering fascinating creatures. Craft vehicles, tools, & bases to survive this mysterious alien world.",
                img: "https://images.unsplash.com/photo-1682687220063-4742bd7fd538?q=80&w=1200",
                dev: "Unknown Worlds Entertainment",
                release: "Oct 2026",
                platforms: ["windows", "apple", "linux"]
            },
            2: {
                title: "Grand Theft Auto VI",
                price: "IDR 1,190,000",
                genre: "Action",
                desc: "Grand Theft Auto VI heads to the state of Leonida, home to the neon-soaked streets of Vice City and beyond in the biggest, most immersive evolution of the Grand Theft Auto series yet. Experience Rockstar Games' signature detail.",
                img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200",
                dev: "Rockstar Games",
                release: "Fall 2025",
                platforms: ["windows"]
            },
            3: {
                title: "Resident Evil Requiem",
                price: "IDR 910,000",
                genre: "Horror",
                desc: "Experience the heart-pounding survival horror. Survival is just the beginning. Solve cryptic puzzles, fight horrifying creatures, and explore dark desolate corridors in Resident Evil Requiem.",
                img: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=1200",
                dev: "Capcom",
                release: "March 2026",
                platforms: ["windows", "apple"]
            },
            4: {
                title: "Forza Horizon 6",
                price: "IDR 899,000",
                genre: "Racing",
                desc: "Your Ultimate Horizon Adventure awaits! Explore the vibrant and ever-evolving open world landscapes of Japan with limitless, fun driving action in hundreds of the world's greatest cars.",
                img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1200",
                dev: "Playground Games",
                release: "June 2026",
                platforms: ["windows", "linux"]
            }
        };

        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id')) || 1;
        const activeGame = gameDb[id] || gameDb[1];

        // Populate elements
        document.getElementById('game-title').textContent = activeGame.title.toUpperCase();
        document.getElementById('game-genre').textContent = activeGame.genre;
        document.getElementById('game-price').textContent = activeGame.price;
        document.getElementById('game-desc').textContent = activeGame.desc;
        document.getElementById('game-img').src = activeGame.img;
        document.getElementById('game-img').alt = activeGame.title;
        document.getElementById('game-dev').textContent = activeGame.dev;
        document.getElementById('game-release').textContent = activeGame.release;

        // Platform icons
        const platWrapper = document.getElementById('game-platforms');
        platWrapper.innerHTML = '';
        activeGame.platforms.forEach(plat => {
            let icon = '';
            if (plat === 'windows') icon = '<i class="fab fa-windows" title="Windows"></i>';
            if (plat === 'apple') icon = '<i class="fab fa-apple" title="macOS"></i>';
            if (plat === 'linux') icon = '<i class="fab fa-linux" title="Linux"></i>';
            platWrapper.innerHTML += icon;
        });

        // Cart & Wishlist functions
        function addGameToCart() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            if (!cart.some(item => item.title === activeGame.title)) {
                cart.push({ title: activeGame.title, price: activeGame.price });
                localStorage.setItem('cart', JSON.stringify(cart));
                showToast(`✅ ${activeGame.title} added to cart!`, "success");
                updateCartBadge();
            } else {
                showToast("Already in cart!");
            }
        }

        function addGameToWishlist() {
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            if (!wishlist.includes(activeGame.title)) {
                wishlist.push(activeGame.title);
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                showToast(`❤️ ${activeGame.title} added to Wishlist!`, "success");
            } else {
                showToast("Already in Wishlist!");
            }
        }

        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').textContent = cart.length;
        }

        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background:#272435;color:white;padding:16px 24px;border-radius:12px;border-left:6px solid ${type === 'success' ? '#22c55e' : '#a855f7'};box-shadow:0 15px 30px rgba(0,0,0,0.5);margin-top:10px;font-size:14px;`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        window.onload = function() {
            updateCartBadge();
        }
    </script>
</body>

</html>
