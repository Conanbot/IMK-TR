            <div class="header-actions">

                    <i class="fas fa-bell"></i>
                </a>

                        aria-expanded="false">
                        <div class="user-avatar">U</div>
                        <div class="user-info">
                            <span class="user-name">User</span>
                            <span class="user-tag">@username</span>
                        </div>
                        <i class="fas fa-chevron-down ms-1" style="font-size: 10px; color: var(--text-muted);"></i>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-dark dropdown-menu-end border-0 shadow-lg mt-2"
                        style="background: #272435; border-radius: 12px; padding: 8px;"
                        aria-labelledby="profileDropdown">
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="wishlist.html"
                                style="font-size: 14px;"><i class="fas fa-heart me-2 text-danger"></i> Wishlist</a></li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3" href="img/setting.html" style="font-size: 14px;"><i
                                    class="fas fa-cog me-2"></i> Settings</a></li>
                        <li>
                            <hr class="dropdown-divider border-secondary opacity-25">
                        </li>
                        <li><a class="dropdown-item py-2 px-3 rounded-3 text-danger" href="login.html"

                </div>
            </div>
        </header>

        <!-- Body -->
        <div class="app-body">
            <!-- Main Viewport -->
            <main class="main-viewport">
                <div class="row g-4">

                    <div class="col-lg-8 d-flex flex-column gap-4">

                        <div>
                            <h2 id="detail-title" class="fw-bold text-white fs-3 mb-1"></h2>
                            <div id="detail-sub" class="text-muted fs-7">
                                <!-- Populated dynamically -->
                            </div>
                        </div>

                        <!-- Glowing Purple Title Progress Bar -->
                        <div class="detail-progress-track" id="title-progress-bar">
                            <div class="detail-progress-fill" id="title-progress-fill"></div>
                        </div>

                        <!-- Media Showcase -->
                        <div class="detail-media-panel">
                            <div class="detail-video-player" id="main-player-container">
                                <!-- PEGI 16 Screen Overlay -->
                                <div class="pegi-screen-sim" id="video-pegi-screen">
                                    <div class="pegi-logo-box">
                                        <div class="pegi-16-number">16</div>
                                        <div class="pegi-url">www.pegi.info</div>
                                    </div>
                                    <div class="pegi-provisional">PROVISIONAL</div>
                                </div>
                                <!-- Video timeline controls overlay -->
                                <div class="video-controls-bar">
                                    <div class="video-timeline-track" onclick="seekVideo(event)">
                                        <div class="video-timeline-fill" id="video-timeline-fill" style="width: 8%;"></div>
                                    </div>
                                    <div class="d-flex justify-content-between align-items-center w-100 px-3 py-2">
                                        <div class="d-flex align-items-center gap-3">
                                            <button class="control-btn" id="play-control-btn" onclick="togglePlayTrailer()"><i class="fas fa-play"></i></button>
                                            <button class="control-btn" onclick="showToast('Next clip')"><i class="fas fa-step-forward"></i></button>
                                            <button class="control-btn" onclick="toggleMute()"><i class="fas fa-volume-up" id="volume-icon"></i></button>
                                            <div class="volume-slider">
                                                <div class="volume-fill"></div>
                                            </div>
                                            <span class="video-time" id="video-time-text">01:00 / 11:53</span>
                                        </div>
                                        <div class="d-flex align-items-center gap-3">
                                            <button class="control-btn" onclick="showToast('Settings')"><i class="fas fa-cog"></i></button>
                                            <button class="control-btn" onclick="showToast('Subtitles')"><i class="fas fa-closed-captioning"></i></button>
                                            <button class="control-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                                        </div>
                                    </div>
                                </div>
                                <img id="main-preview-img" src="" class="w-100 h-100 object-fit-cover" alt="Main Preview">
                            </div>
                            
                            <!-- Sidebar Screenshots Thumbnails -->
                            <div class="detail-screenshot-list" id="detail-screenshot-list">
                                <!-- Populated dynamically -->
                            </div>
                        </div>

                        <!-- Cards Grid (Overview & Specs/Reviews side-by-side) -->
                        <div class="row g-4">
                            <!-- Left Card: Overview -->
                            <div class="col-md-6">
                                <div class="gamedetail-panel">
                                    <h5 class="gamedetail-panel-title">Overview</h5>
                                    <!-- Tag Pills -->
                                    <div class="d-flex flex-wrap gap-2 mb-3" id="overview-tags">
                                        <!-- Populated dynamically -->
                                    </div>
                                    <!-- Release Date & Review Summary -->
                                    <div class="row g-2 mb-3">
                                        <div class="col-6">
                                            <div class="overview-stat-box">
                                                <div class="overview-stat-label">Release Date</div>
                                                <div class="overview-stat-val" id="detail-release"></div>
                                            </div>
                                        </div>
                                        <div class="col-6">
                                            <div class="overview-stat-box">
                                                <div class="overview-stat-label">Review Summary</div>
                                                <div class="overview-stat-val highlight-blue" id="detail-review"></div>
                                            </div>
                                        </div>
                                    </div>
                                    <p id="detail-desc" style="line-height: 1.7; font-size: 12.5px; margin: 0; color: var(--text-muted);"></p>
                                </div>
                            </div>

                            <!-- Right Card: System Requirements & Reviews -->
                            <div class="col-md-6">
                                <div class="gamedetail-panel">
                                    <div class="specs-tab-header">
                                        <button class="specs-tab-btn active" id="btn-tab-specs" onclick="switchSpecsTab('specs')">System Requirements</button>
                                        <button class="specs-tab-btn" id="btn-tab-reviews" onclick="switchSpecsTab('reviews')">Reviews</button>
                                    </div>
                                    
                                    <div id="specs-tab-content">
                                        <!-- Specs Columns (Minimum & Recommended) -->
                                        <div class="specs-sub-container" id="specs-container">
                                            <!-- Populated dynamically -->
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Latest News & Events -->
                        <div class="gamedetail-panel">
                            <div class="section-header border-0 mb-3 p-0" style="display: flex; align-items: center; justify-content: space-between;">
                                <h4 class="section-title text-white mb-0" style="font-size: 16px;">Latest News & Events</h4>
                                <button class="btn-see-all" onclick="showToast('Loading all events...')">View All</button>
                            </div>
                            <div class="row g-3" id="news-grid-container">
                                <!-- Populated dynamically -->
                            </div>
                        </div>
                    </div>

                    <!-- Right Column (Cover, Actions, Languages, Share) -->
                    <div class="col-lg-4 d-flex flex-column gap-4">

                        <div class="gamedetail-right-card text-center">

                            <div class="d-grid gap-2" id="action-btn-wrapper">

                                <thead>

                                        <th>Interface</th>
                                        <th>Full Audio</th>

                                </tbody>
                            </table>

                            <a href="#" class="gamedetail-share-btn" onclick="showToast('Sharing on Telegram...')"><i class="fab fa-telegram-plane"></i></a>
                        </div>
                    </div>
                </div>

    <!-- Toast container -->

                img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000",
                screenshots: [
                    "https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=800", // golden tree
                    "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=800", // ruins / knight
                    "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=800"  // dark tree
                ],
                minRequirements: {
                    os: "Windows 10 64-bit",
                    processor: "Intel Core i5-8400 / AMD Ryzen 3 3300X",
                    graphics: "NVIDIA GTX 1060 3GB / AMD Radeon RX 580 4GB",
                    ram: "12 GB",
                    vram: "3-4 GB",
                    storage: "60 GB",
                    directx: "Version 12"
                },
                recRequirements: {
                    os: "Windows 10/11 64-bit",
                    processor: "Intel Core i7-8700K / AMD Ryzen 5 3600X",
                    graphics: "NVIDIA RTX 2070 8GB / AMD Radeon RX 6700 XT 12GB",
                    ram: "16 GB",
                    vram: "8-12 GB",
                    storage: "60 GB SSD",
                    directx: "Version 12"
                },
                news: {
                    img1: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?q=80&w=600",
                    img2: "https://images.unsplash.com/photo-1505635330303-31953079b243?q=80&w=600",
                    text2: "Follow in the footsteps of Miquella once more with this exclusive 2 disc vinyl collection, celebrating the sweeping, emotional journey of..."
                },
                languages: [
                    { name: "English", interface: true, audio: true, subtitles: true },
                    { name: "French", interface: true, audio: false, subtitles: true },
                    { name: "Italian", interface: true, audio: false, subtitles: true },
                    { name: "German", interface: true, audio: false, subtitles: true }
                ],
                defaultState: "install"
            }
        };

        const params = new URLSearchParams(window.location.search);
        let gameKey = params.get('key') || params.get('id') || 'elden-ring';
        let activeGame = gameDb[gameKey] || Object.values(gameDb).find(g => g.id === gameKey) || gameDb['elden-ring'];

        // Populate basic text
        document.getElementById('detail-title').textContent = activeGame.title.toUpperCase();
        document.getElementById('detail-desc').textContent = activeGame.desc;
        document.getElementById('detail-release').textContent = activeGame.release;
        document.getElementById('detail-review').textContent = activeGame.rating;
        document.getElementById('detail-cover-art').src = activeGame.img;

        // Populate developer / publisher text
        document.getElementById('detail-sub').innerHTML = `
            <span class="text-white">${activeGame.dev}</span> &nbsp;&bull;&nbsp; Publisher: <span class="text-white">${activeGame.publisher}</span>
        `;

        // Populate tags
        const tagsContainer = document.getElementById('overview-tags');
        if (tagsContainer) {
            tagsContainer.innerHTML = '';
            activeGame.tags.forEach(tag => {
                tagsContainer.innerHTML += `<span class="gamedetail-tag-pill">${tag}</span>`;
            });
        }

        // Populate screenshots list
        const ssList = document.getElementById('detail-screenshot-list');
        if (ssList && activeGame.screenshots) {
            ssList.innerHTML = '';
            activeGame.screenshots.forEach((url, index) => {
                const activeClass = index === 0 ? 'active' : '';
                ssList.innerHTML += `
                    <div class="detail-screenshot-thumb ${activeClass}" onclick="changePreview(this, '${url}')">
                        <img src="${url}" alt="Thumb ${index + 1}">
                    </div>
                `;
            });
            // Set initial preview to first screenshot
            document.getElementById('main-preview-img').src = activeGame.screenshots[0];
        }

        // Populate news
        const newsContainer = document.getElementById('news-grid-container');
        if (newsContainer && activeGame.news) {
            newsContainer.innerHTML = `
                <div class="col-md-6">
                    <div class="news-card-left" style="cursor: pointer;" onclick="showToast('Loading news event...')">
                        <img src="${activeGame.news.img1}" alt="News Event 1">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="news-card-right" style="background-image: url('${activeGame.news.img2}'); cursor: pointer;" onclick="showToast('Loading news patch...')">
                        <div class="news-card-content">
                            <span class="news-tag">News</span>
                            <h6 class="news-title">${activeGame.news.text2}</h6>
                        </div>
                    </div>
                </div>
            `;
        }

        // Populate languages
        const langBody = document.getElementById('languages-table-body');
        if (langBody && activeGame.languages) {
            langBody.innerHTML = '';
            activeGame.languages.forEach(lang => {
                langBody.innerHTML += `
                    <tr>
                        <td>${lang.name}</td>
                        <td>${lang.interface ? '<i class="fas fa-check"></i>' : '-'}</td>
                        <td>${lang.audio ? '<i class="fas fa-check"></i>' : '-'}</td>
                        <td>${lang.subtitles ? '<i class="fas fa-check"></i>' : '-'}</td>
                    </tr>
                `;
            });
        }

        // Render specs initial tab
        renderSpecs();

        function renderSpecs() {
            const specsContainer = document.getElementById('specs-container');
            if (!specsContainer) return;
            
            let minSpecsHtml = `
                <div class="specs-sub-col">
                    <h6 class="specs-sub-title"><i class="fab fa-windows"></i> Minimum</h6>
                    <div class="specs-list">
            `;
            if (activeGame.minRequirements) {
                for (const [key, value] of Object.entries(activeGame.minRequirements)) {
                    const label = key === 'os' ? 'OS' : key.charAt(0).toUpperCase() + key.slice(1);
                    minSpecsHtml += `
                        <div class="specs-item">
                            <strong>${label}:</strong> ${value}
                        </div>
                    `;
                }
            }
            minSpecsHtml += `
                    </div>
                </div>
            `;

            let recSpecsHtml = `
                <div class="specs-sub-col">
                    <h6 class="specs-sub-title"><i class="fab fa-windows"></i> Recommended</h6>
                    <div class="specs-list">
            `;
            if (activeGame.recRequirements) {
                for (const [key, value] of Object.entries(activeGame.recRequirements)) {
                    const label = key === 'os' ? 'OS' : key.charAt(0).toUpperCase() + key.slice(1);
                    recSpecsHtml += `
                        <div class="specs-item">
                            <strong>${label}:</strong> ${value}
                        </div>
                    `;
                }
            }
            recSpecsHtml += `
                    </div>
                </div>
            `;

            specsContainer.innerHTML = minSpecsHtml + recSpecsHtml;
        }

        function switchSpecsTab(tabName) {
            const btnSpecs = document.getElementById('btn-tab-specs');
            const btnReviews = document.getElementById('btn-tab-reviews');
            const tabContent = document.getElementById('specs-tab-content');

            if (tabName === 'specs') {
                btnSpecs.classList.add('active');
                btnReviews.classList.remove('active');
                tabContent.innerHTML = `<div class="specs-sub-container" id="specs-container"></div>`;
                renderSpecs();
            } else {
                btnSpecs.classList.remove('active');
                btnReviews.classList.add('active');
                tabContent.innerHTML = `
                    <div class="text-muted p-2" style="font-size:12px; line-height:1.6;">
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <div class="bg-success rounded-circle" style="width:8px; height:8px;"></div>
                            <strong class="text-white">Community Reviews</strong>
                        </div>
                        <div class="mb-3 pb-3 border-bottom border-secondary border-opacity-25">
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-info fw-semibold">Recommend (Reviewer A)</span>
                                <span class="text-muted">Play time: 42 hrs</span>
                            </div>
                            <p class="mb-0">This game has absolutely stunning visuals and runs incredibly well on my setup. Highly recommend to everyone!</p>
                        </div>
                        <div>
                            <div class="d-flex justify-content-between mb-1">
                                <span class="text-info fw-semibold">Recommend (Reviewer B)</span>
                                <span class="text-muted">Play time: 104 hrs</span>
                            </div>
                            <p class="mb-0">One of the best titles released this year. The atmosphere is top-notch and the gameplay loop is extremely satisfying.</p>
                        </div>
                    </div>
                `;
            }
        }

        function renderDetailButton() {
            const btnWrapper = document.getElementById('action-btn-wrapper');
            const stateKey = `lib-state-${activeGame.id}`;
            const currentStatus = localStorage.getItem(stateKey) || activeGame.defaultState;

            if (currentStatus === 'play') {
                btnWrapper.innerHTML = `
                    <button class="btn btn-steam-play w-100 py-3 fw-bold d-flex align-items-center justify-content-center gap-2" onclick="playGame()">
                        <i class="fas fa-play" style="font-size: 14px;"></i> Play
                    </button>
                `;
                document.getElementById('title-progress-bar').style.display = 'none';
            } else if (currentStatus === 'install') {
                btnWrapper.innerHTML = `
                    <button class="btn btn-steam-blue w-100 py-3 fw-bold d-flex align-items-center justify-content-center gap-2" onclick="startInstall()">
                        <i class="fas fa-download" style="font-size: 14px;"></i> Install
                    </button>
                `;
                document.getElementById('title-progress-bar').style.display = 'none';
            } else if (currentStatus === 'update') {
                btnWrapper.innerHTML = `
                    <button class="btn btn-steam-blue w-100 py-3 fw-bold d-flex align-items-center justify-content-center gap-2" onclick="startInstall()">
                        <i class="fas fa-download" style="font-size: 14px;"></i> Update
                    </button>
                `;
                document.getElementById('title-progress-bar').style.display = 'none';
            } else if (currentStatus === 'installing' || currentStatus === 'updating') {
                let text = currentStatus === 'installing' ? 'Installing' : 'Updating';
                let pct = localStorage.getItem(`lib-pct-${activeGame.id}`) || 0;
                btnWrapper.innerHTML = `
                    <button class="btn btn-steam-blue w-100 py-3 fw-bold d-flex align-items-center justify-content-center gap-2" disabled>
                        <i class="fas fa-download" style="font-size: 14px;"></i> ${text}
                    </button>
                `;

                // Show title bar progress
                const bar = document.getElementById('title-progress-bar');
                const fill = document.getElementById('title-progress-fill');
                if (bar && fill) {
                    bar.style.display = 'block';
                    fill.style.width = pct + '%';
                }
            }
            updateCartBadge();
        }

        // Custom Player Interactions
        let isVideoPlaying = false;
        let videoInterval = null;
        let videoTime = 60; // 01:00

        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function togglePlayTrailer() {
            const pegiScreen = document.getElementById('video-pegi-screen');
            const playBtn = document.getElementById('play-control-btn');
            const timeText = document.getElementById('video-time-text');
            const timeFill = document.getElementById('video-timeline-fill');

            if (!isVideoPlaying) {
                // Play
                isVideoPlaying = true;
                if (pegiScreen) {
                    pegiScreen.style.opacity = '0';
                    pegiScreen.style.pointerEvents = 'none';
                }
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';

                videoInterval = setInterval(() => {
                    videoTime++;
                    if (videoTime > 713) videoTime = 713; // 11:53 max
                    timeText.textContent = `${formatTime(videoTime)} / 11:53`;
                    timeFill.style.width = ((videoTime / 713) * 100) + '%';
                }, 1000);
            } else {
                // Pause
                isVideoPlaying = false;
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                clearInterval(videoInterval);
            }
        }

        function seekVideo(e) {
            const track = e.currentTarget;
            const rect = track.getBoundingClientRect();
            const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));

            const timeFill = document.getElementById('video-timeline-fill');
            timeFill.style.width = (pos * 100) + '%';

            videoTime = Math.floor(pos * 713);
            document.getElementById('video-time-text').textContent = `${formatTime(videoTime)} / 11:53`;

            // Auto hide PEGI screen if seeking
            const pegiScreen = document.getElementById('video-pegi-screen');
            if (pegiScreen) {
                pegiScreen.style.opacity = '0';
                pegiScreen.style.pointerEvents = 'none';
            }
        }

        function toggleMute() {
            const icon = document.getElementById('volume-icon');
            if (icon.classList.contains('fa-volume-up')) {
                icon.className = 'fas fa-volume-mute text-danger';
            } else {
                icon.className = 'fas fa-volume-up';
            }
        }

        function toggleFullscreen() {
            const container = document.getElementById('main-player-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(err => console.log(err));
            } else {
                document.exitFullscreen();
            }
        }

        function changePreview(thumb, url) {
            // Stop video if switching preview
            if (isVideoPlaying) togglePlayTrailer();

            document.querySelectorAll('.detail-screenshot-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
            document.getElementById('main-preview-img').src = url;

            // Show PEGI screen again if first thumbnail, otherwise hide it
            const pegiScreen = document.getElementById('video-pegi-screen');
            if (thumb === document.querySelectorAll('.detail-screenshot-thumb')[0]) {
                pegiScreen.style.opacity = '1';
                pegiScreen.style.pointerEvents = 'auto';
                videoTime = 60; // reset to 01:00
                document.getElementById('video-timeline-fill').style.width = '8%';
                document.getElementById('video-time-text').textContent = `01:00 / 11:53`;
            } else {
                pegiScreen.style.opacity = '0';
                pegiScreen.style.pointerEvents = 'none';
            }
        }

        function playGame() {
            showToast(`🚀 Launching ${activeGame.title}... Enjoy!`, "success");
        }

        // Install / Update simulation
        function startInstall() {
            const stateKey = `lib-state-${activeGame.id}`;
            const pctKey = `lib-pct-${activeGame.id}`;
            const curState = localStorage.getItem(stateKey) || activeGame.defaultState;
            const action = curState === 'install' ? 'installing' : 'updating';

            localStorage.setItem(stateKey, action);
            localStorage.setItem(pctKey, '0');

            renderDetailButton();

            let pct = 0;
            let interval = setInterval(() => {
                pct += Math.floor(Math.random() * 8) + 4;
                if (pct >= 100) {
                    pct = 100;
                    clearInterval(interval);
                    localStorage.setItem(stateKey, 'play');
                    localStorage.removeItem(pctKey);
                    showToast(`🎉 ${activeGame.title} is now ready to play!`, "success");
                    renderDetailButton();
                } else {
                    localStorage.setItem(pctKey, pct.toString());
                    const fill = document.getElementById('title-progress-fill');
                    if (fill) {
                        fill.style.width = pct + '%';
                    }
                }
            }, 250);
        }

        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').textContent = cart.length;
        }

        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background:#272435;color:white;padding:16px 24px;border-radius:12px;border-left:6px solid ${type === 'success' ? '#22c55e' : '#a855f7'};box-shadow:0 15px 30px rgba(0,0,0,0.5);margin-top:10px;font-size:14px;z-index:9999;pointer-events:none;`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Resume installer loop on reload if in-progress
        window.onload = function () {
            renderDetailButton();

            const stateKey = `lib-state-${activeGame.id}`;
            const currentStatus = localStorage.getItem(stateKey) || activeGame.defaultState;
            if (currentStatus === 'installing' || currentStatus === 'updating') {
                let startPct = parseInt(localStorage.getItem(`lib-pct-${activeGame.id}`)) || 0;
                resumeInstall(startPct);
            }
        }

        function resumeInstall(startPct) {
            const stateKey = `lib-state-${activeGame.id}`;
            const pctKey = `lib-pct-${activeGame.id}`;
            let pct = startPct;

            let interval = setInterval(() => {
                pct += Math.floor(Math.random() * 8) + 4;
                if (pct >= 100) {
                    pct = 100;
                    clearInterval(interval);
                    localStorage.setItem(stateKey, 'play');
                    localStorage.removeItem(pctKey);
                    showToast(`🎉 ${activeGame.title} is now ready to play!`, "success");
                    renderDetailButton();
                } else {
                    localStorage.setItem(pctKey, pct.toString());
                    const fill = document.getElementById('title-progress-fill');
                    if (fill) {
                        fill.style.width = pct + '%';
                    }
                }
            }, 250);
        }
    </script>
</body>

</html>
