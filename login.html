<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page-bg">
    <div class="auth-card" style="width: 440px; max-width: 100%;">
        <div class="text-center mb-4">
            <h2 class="auth-title text-white">Sign In</h2>
            <p class="auth-subtitle mb-0">Access your GameHub gaming library</p>
        </div>

        <form action="index.html" onsubmit="handleSignIn(event)">
            <!-- Account Name -->
            <div class="mb-3">
                <label class="form-label form-label-custom">Account Name</label>
                <input type="text" class="form-control form-control-custom w-100" placeholder="Username or Email" required>
            </div>

            <!-- Password -->
            <div class="mb-4">
                <label class="form-label form-label-custom">Password</label>
                <input type="password" class="form-control form-control-custom w-100" placeholder="••••••••" required>
            </div>

            <!-- Remember me checkbox & Forgot password link -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-2">
                    <input type="checkbox" id="remember-me">
                    <label for="remember-me" style="font-size: 13px; color: var(--text-light); cursor: pointer; user-select: none;">Remember me</label>
                </div>
                <a href="#" class="text-purple text-decoration-none" style="font-size: 13px; color: #a855f7;" onclick="showToast('Reset password link sent to registered email.')">Forgot password?</a>
            </div>

            <!-- Sign In button -->
            <button type="submit" class="btn btn-solid-purple w-100 py-3 mb-3">Sign In</button>

            <!-- Create Account Link -->
            <div class="text-center mt-3">
                <span class="text-muted" style="font-size: 13px;">New to GameHub? </span>
                <a href="register.html" class="text-purple text-decoration-none fw-semibold" style="font-size: 13px; color: #a855f7;">Create a Free Account</a>
            </div>
        </form>
    </div>

    <!-- Toast container -->
    <div id="toast-container" style="position: fixed; bottom: 30px; right: 30px; z-index: 99999;"></div>

    <script>
        function showToast(msg, type = "info") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.style.cssText = `background:#272435;color:white;padding:16px 24px;border-radius:12px;border-left:6px solid ${type === 'success' ? '#22c55e' : '#a855f7'};box-shadow:0 15px 30px rgba(0,0,0,0.5);margin-top:10px;font-size:14px;`;
            toast.textContent = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s ease';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function handleSignIn(e) {
            e.preventDefault();
            showToast("Welcome back! Redirecting...", "success");
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1500);
        }
    </script>
</body>

</html>
