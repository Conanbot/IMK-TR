<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100 bg-dark">
    <div class="card bg-dark text-light" style="width: 420px;">
        <div class="card-body p-5">
            <h2 class="text-center mb-4">Sign In</h2>
            <input type="text" class="form-control mb-3" placeholder="Account Name">
            <input type="password" class="form-control mb-4" placeholder="Password">
            <button onclick="window.location='index.html'" class="btn btn-purple w-100">Sign In</button>
            <a href="register.html" class="text-center d-block mt-3 text-purple">Create a Free Account</a>
        </div>
    </div>
</body>

</html>
